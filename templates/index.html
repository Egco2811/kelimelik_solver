<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kelimelik Solver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
    {% raw %}
    <div id="app">
        <div class="game-container text-center">
            <h1 class="mb-4">KELİMELİK</h1>
            <!-- Board -->
            <div class="board-wrapper" tabindex="0" @keydown="onKey" @click="focusBoard" @contextmenu.prevent>
                <table id="board">
                    <tr v-for="r in 15" :key="r">
                        <td v-for="c in 15" :key="c"
                            :class="cellClass(r,c)"
                            @click="clickCell(r,c)"
                            @contextmenu.stop="rightClick(r,c,$event)">
                            <span v-if="!board[r-1][c-1] && premiumType(r,c)" class="premium-text" v-html="premiumLabel(r,c)"></span>
                            <span v-if="board[r-1][c-1]" class="tile-content">
                                {{ board[r-1][c-1] }}<span class="tile-point">{{ points[board[r-1][c-1]] }}</span>
                            </span>
                            <span v-if="isNextCell(r,c) && !board[r-1][c-1]" class="next-arrow">
                                {{ directionOrientation === 'right' ? '→' : '↓' }}
                            </span>
                        </td>
                    </tr>
                </table>
            </div>

            <!-- Rack -->
            <div class="rack-section">
                <div class="rack-label">Elinizdeki Harfler</div>
                <div class="rack-input-container" tabindex="0"
                     :class="{ 'rack-focused': rackFocused }"
                     @click="focusRack" @keydown="onRackKey"
                     @focus="rackFocused=true" @blur="rackFocused=false">
                    <div v-if="rack.length === 0" class="rack-placeholder">
                        Buraya tıklayıp harf yazın...
                    </div>
                    <div v-for="(letter, idx) in rack" :key="idx" class="rack-tile">
                        {{ letter }}<span class="point">{{ points[letter] }}</span>
                    </div>
                </div>
            </div>

            <!-- Context Menu -->
            <div v-if="ctxMenu" class="context-menu" :style="{left:ctxMenu.x+'px', top:ctxMenu.y+'px'}">
                <div class="context-item" @click="toggleBonus">⭐⭐⭐ 25 Puan Bonusu</div>
                <div class="context-item" @click="clearCell(ctxMenu.r, ctxMenu.c); ctxMenu=null">🗑️ Hücreyi Temizle</div>
                <div class="context-item" @click="ctxMenu=null">İptal</div>
            </div>
        </div>
    </div>
    {% endraw %}
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
